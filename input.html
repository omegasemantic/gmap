<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: #fff;
  }
  form {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 90%;
    max-width: 600px;
  }
  input[type="text"] {
    width: 100%;
    padding: 12px 16px;
    font-size: 1.2rem;
    border: 1px solid #dfe1e5;
    border-radius: 24px;
    outline: none;
    box-sizing: border-box;
    box-shadow: 0 1px 6px rgba(0,0,0,0.1);
  }
  button {
    padding: 10px 28px;
    font-size: 1rem;
    border: none;
    border-radius: 24px;
    background: #f8f9fa;
    cursor: pointer;
  }
</style>
</head>
<body>
<form action="/query" method="POST">
  <input type="text" name="q" autofocus autocomplete="off" placeholder="to + from">
  <button type="submit">go</button>
</form>
</body>
</html>
